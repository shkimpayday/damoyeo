# ============================================================
# 다모여 CI/CD Pipeline
# 트리거: main 브랜치 push
# 동작:
#   1. Backend Docker 이미지 빌드 → Docker Hub 푸시
#   2. Frontend Docker 이미지 빌드 → Docker Hub 푸시
#   3. EC2 SSH 접속 → docker compose pull & up
# ============================================================

name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  # 수동 실행도 가능하도록
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 코드 체크아웃 ─────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Docker Buildx 설정 (캐시 지원) ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Docker Hub 로그인 ─────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 4. Backend 이미지 빌드 & 푸시 ───────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/damoyeo-backend:latest
          # GitHub Actions 캐시 활용 (빌드 속도 향상)
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── 5. Frontend 이미지 빌드 & 푸시 ──────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/damoyeo-frontend:latest
          # VITE_ 환경변수는 빌드 시점에 번들링되므로 build-args로 주입
          build-args: |
            VITE_API_HOST=${{ secrets.VITE_API_HOST }}
            VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── 6. EC2 배포 ──────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # 배포 디렉토리 이동
            cd ~/damoyeo

            # 최신 docker-compose.prod.yml 적용
            # (파일이 바뀌었을 경우를 대비해 git pull 또는 직접 작성)

            # .env 파일 생성 (매 배포마다 최신화)
            # heredoc 대신 printf 사용 - 들여쓰기로 인한 공백 버그 방지
            printf '%s\n' \
              "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" \
              "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" \
              "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" \
              "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}" \
              "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" \
              "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" \
              > .env

            # 최신 이미지 pull
            docker compose -f docker-compose.prod.yml pull

            # 컨테이너 재시작 (다운타임 최소화)
            docker compose -f docker-compose.prod.yml up -d

            # 미사용 이미지 정리 (디스크 절약)
            docker image prune -f

            echo "✅ 배포 완료: $(date)"
