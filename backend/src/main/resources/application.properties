# Server
server.port=8080

# Database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/damoyeo
spring.datasource.username=damoyeo
spring.datasource.password=damoyeo

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# JWT
com.damoyeo.jwt.secret=damoyeo-secret-key-for-jwt-authentication-must-be-at-least-256-bits-long
com.damoyeo.jwt.access-token-expiration=600000
com.damoyeo.jwt.refresh-token-expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
com.damoyeo.upload.path=uploads

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.damoyeo=DEBUG

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email Verification
com.damoyeo.mail.verification-code-expiration=300000
