# Server
server.port=8080

# Database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/damoyeo}
spring.datasource.username=${DB_USERNAME:damoyeo}
spring.datasource.password=${DB_PASSWORD:damoyeo}

# Jackson - 날짜를 UTC 기준 ISO 8601로 직렬화 (타임존 오류 방지)
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
# 운영 환경에서는 false로 설정 (SHOW_SQL=false 환경변수로 제어)
spring.jpa.show-sql=${SHOW_SQL:false}

# JWT
com.damoyeo.jwt.secret=${JWT_SECRET:damoyeo-secret-key-for-jwt-authentication-must-be-at-least-256-bits-long}
com.damoyeo.jwt.access-token-expiration=10800000
com.damoyeo.jwt.refresh-token-expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
# 운영 환경에서는 절대 경로로 지정 (예: /var/data/damoyeo/uploads)
com.damoyeo.upload.path=${UPLOAD_PATH:uploads}

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.damoyeo=INFO

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email Verification
com.damoyeo.mail.verification-code-expiration=300000

# KakaoPay
# 실제 키 발급: https://developers.kakaopay.com/
kakao.pay.secret-key=${KAKAO_PAY_SECRET_KEY:DEVAFEEE1B3FD6A4E96C218807711E379891CD14}
kakao.pay.cid=TC0ONETIME
kakao.pay.ready-url=https://open-api.kakaopay.com/online/v1/payment/ready
kakao.pay.approve-url=https://open-api.kakaopay.com/online/v1/payment/approve
# 테스트 모드 (true: 실제 카카오페이 호출 없이 바로 성공 처리)
kakao.pay.test-mode=${KAKAO_PAY_TEST_MODE:false}

# Frontend URL (for payment callbacks)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# CORS 허용 출처 (콤마 구분, SecurityConfig + WebSocketConfig에서 사용)
# 배포 시: CORS_ALLOWED_ORIGINS=https://damoyeo.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Kakao OAuth Login
# 카카오 개발자 콘솔 > 앱 > 플랫폼 키 > REST API 키
kakao.oauth.client-id=${KAKAO_CLIENT_ID:}
# 카카오 개발자 콘솔 > 카카오 로그인 > 보안 > Client Secret (미설정 시 비워둠)
kakao.oauth.client-secret=${KAKAO_CLIENT_SECRET:}
