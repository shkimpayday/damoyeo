# ============================================================
# 다모여 Production Docker Compose
# 서비스: mariadb, backend, frontend(nginx)
# 사용법: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── MariaDB ─────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: damoyeo-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: damoyeo
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      # SSH 터널링으로 로컬 HeidiSQL 연결용 (127.0.0.1만 바인딩 → 외부 직접 접근 차단)
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - damoyeo-network
    restart: unless-stopped
    # 메모리 제한 (t2.micro 환경)
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot Backend ─────────────────────────────────
  backend:
    image: ${DOCKER_USERNAME}/damoyeo-backend:latest
    container_name: damoyeo-backend
    environment:
      # Database
      # & 문자는 YAML에서 따옴표로 감싸야 올바르게 파싱됨
      DB_URL: "jdbc:mariadb://mariadb:3306/damoyeo?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Mail
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # CORS (EC2 퍼블릭 IP 또는 도메인)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # File Upload
      UPLOAD_PATH: /app/uploads
      # Frontend URL (카카오페이 콜백 등)
      FRONTEND_URL: ${FRONTEND_URL}
      # Kakao OAuth Login (REST API 키)
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      # Kakao OAuth Client Secret (보안 활성화 시 필수)
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      # KakaoPay (실제 키 없이 결제 플로우 테스트 시 true)
      KAKAO_PAY_TEST_MODE: ${KAKAO_PAY_TEST_MODE:-false}
      # EC2 .env에 KAKAO_PAY_SECRET_KEY가 없으면 dev 테스트 키 사용
      KAKAO_PAY_SECRET_KEY: ${KAKAO_PAY_SECRET_KEY:-DEVAFEEE1B3FD6A4E96C218807711E379891CD14}
    volumes:
      # 업로드 파일 영속 저장 (컨테이너 재시작 후에도 유지)
      - uploads_data:/app/uploads
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - damoyeo-network
    restart: unless-stopped
    mem_limit: 512m

  # ── Nginx + React Frontend ───────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/damoyeo-frontend:latest
    container_name: damoyeo-frontend
    ports:
      # 호스트 nginx(SSL)가 localhost:8888 → 컨테이너:80 으로 프록시
      # 127.0.0.1 바인딩 → EC2 외부에서 직접 80포트 접근 차단 (보안)
      - "127.0.0.1:8888:80"
    depends_on:
      - backend
    networks:
      - damoyeo-network
    restart: unless-stopped
    mem_limit: 64m

# ── Networks ─────────────────────────────────────────────
networks:
  damoyeo-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────
volumes:
  db_data:      # MariaDB 데이터 영속 저장
  uploads_data: # 업로드 파일 영속 저장
