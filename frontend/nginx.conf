# ============================================================
# 다모여 Frontend Nginx 설정
#
# 이 파일은 Docker 컨테이너 안에서 실행되는 nginx 설정입니다.
# (EC2에 설치된 "호스트 nginx"와 별개 - 이건 컨테이너 안 nginx)
#
# 역할 3가지:
#   1. React 빌드 파일(HTML/CSS/JS)을 브라우저에 전달
#   2. /api/* 요청을 백엔드 컨테이너로 중계 (프록시)
#   3. /ws/*  웹소켓 연결을 백엔드 컨테이너로 중계
#
# 전체 흐름:
#   브라우저 → 호스트 nginx(SSL 처리) → 이 파일의 nginx → 백엔드/정적파일
# ============================================================

server {
    # ── 포트 설정 ──────────────────────────────────────────
    # listen 80: 이 nginx가 80번 포트에서 요청을 기다린다는 선언
    #
    # 포트(Port)란?
    #   하나의 컴퓨터(서버)에는 수만 개의 "문"이 있습니다.
    #   각 문에 번호가 붙어 있어서 어떤 프로그램이 어느 문을 쓸지 구분합니다.
    #   80번은 HTTP 웹 통신을 위해 전 세계적으로 약속된 번호입니다.
    #
    # 이 컨테이너의 80번 포트는 외부에 직접 노출되지 않습니다.
    # docker-compose.prod.yml에서 "127.0.0.1:8888:80" 으로 설정되어 있어서
    # EC2 내부의 8888번 문으로만 접근 가능합니다. (호스트 nginx만 접근 가능)
    listen 80;

    # server_name _: 어떤 도메인/IP로 요청이 와도 이 서버가 처리한다는 뜻
    #
    # _는 "무엇이든 받겠다"는 와일드카드(만능) 표시입니다.
    # 왜 이렇게 설정하나?
    #   이 컨테이너는 도메인을 모릅니다. (damoyeo.store는 호스트 nginx가 처리)
    #   호스트 nginx가 도메인 처리를 다 끝내고 내부로 전달해주기 때문에
    #   이 컨테이너는 "뭐가 오든 처리한다"로 설정해도 됩니다.
    server_name _;

    # ── React 빌드 파일 위치 ───────────────────────────────
    # root: 정적 파일(HTML, CSS, JS, 이미지)이 저장된 폴더 경로
    #
    # Dockerfile에서 npm run build 로 만든 파일들이 이 경로에 복사됩니다.
    # 브라우저가 damoyeo.store/ 에 접속하면 이 폴더에서 index.html을 찾아 반환합니다.
    root /usr/share/nginx/html;

    # index: 경로에 파일명 없이 접속했을 때 기본으로 반환할 파일
    # damoyeo.store/ → index.html 반환
    # damoyeo.store/groups/list → try_files 규칙 적용 (아래 설명)
    index index.html;

    # ── Gzip 압축 설정 (전송 속도 최적화) ─────────────────
    # Gzip이란?
    #   파일을 압축해서 보내면 용량이 줄어들어 더 빠르게 전달됩니다.
    #   예: 100KB JS 파일 → Gzip 압축 → 30KB로 줄어서 전송 → 브라우저가 압축 해제
    #   특히 텍스트 파일(HTML/CSS/JS)은 압축률이 높아서 효과적입니다.
    gzip on;

    # gzip_types: 압축을 적용할 파일 종류 목록
    #   text/plain        → 일반 텍스트
    #   text/css          → CSS 스타일시트
    #   application/json  → JSON 데이터 (API 응답)
    #   application/javascript → JavaScript 파일
    #   text/xml, application/xml → XML 파일
    #   image/svg+xml     → SVG 벡터 이미지 (텍스트 기반이라 압축 효과 큼)
    #
    # 이미지(jpg, png, gif)는 이미 압축된 포맷이라 목록에 없습니다.
    # 압축된 것을 또 압축하면 오히려 용량이 커질 수 있습니다.
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # gzip_min_length: 이 크기 이상인 파일만 압축 (단위: 바이트)
    # 1024 = 1KB. 너무 작은 파일은 압축 효과보다 압축/해제 비용이 더 커서 제외합니다.
    gzip_min_length 1024;

    # ── React Router SPA 지원 ──────────────────────────────
    # SPA(Single Page Application)란?
    #   React 앱은 실제 파일이 index.html 하나뿐입니다.
    #   /groups/list, /member/login 같은 경로는 실제 파일이 없고
    #   index.html을 로드한 뒤 JavaScript가 URL을 읽어 화면을 그려줍니다.
    #
    # 문제: 브라우저에서 damoyeo.store/groups/list 직접 입력 시
    #   nginx가 /groups/list 라는 실제 파일을 찾으려 함 → 없음 → 404 오류
    #
    # 해결: try_files로 "파일 없으면 index.html 주세요" 설정
    #   $uri       → 요청 경로에 해당하는 파일이 있으면 그걸 반환 (JS, 이미지 등)
    #   $uri/      → 해당 경로가 폴더라면 그 안의 index 파일 반환
    #   /index.html → 위 둘 다 없으면 무조건 index.html 반환 → React가 라우팅 처리
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 정적 파일 캐싱 ─────────────────────────────────────
    # 캐싱(Caching)이란?
    #   브라우저가 한 번 받은 파일을 로컬에 저장해두고
    #   다음 방문 시 서버에서 다시 다운로드하지 않고 저장된 파일을 사용하는 것
    #
    # JS, CSS, 이미지는 배포할 때마다 파일명에 해시가 붙어 바뀝니다.
    #   예: main.a3f9b2c.js → 새 배포 시 → main.d8e1f4a.js (새 이름)
    # 그래서 1년 동안 캐시해도 문제없습니다. (새 파일은 새 이름이라 자동으로 새로 받음)
    #
    # ~* : 대소문자 구분 없이 정규식(패턴)으로 경로 매칭
    # \.  : 점(.) 문자 (정규식에서 .는 "아무 문자"라는 뜻이라 \로 "진짜 점"임을 표시)
    # (js|css|...) : 이 확장자들 중 하나와 일치하면 적용
    # $  : 문자열 끝 (파일명이 이 확장자로 끝나야 함)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # expires 1y: 1년 동안 이 파일은 캐시에서 사용하도록 브라우저에 지시
        expires 1y;

        # Cache-Control 헤더: 캐시 동작 방식을 상세 지정
        #   public    → 브라우저뿐 아니라 중간 CDN 서버도 캐시 가능
        #   immutable → "이 파일은 절대 바뀌지 않으니 만료 전에 재확인 요청 금지"
        #               (일반 캐시는 만료 전에도 "아직 유효해?" 서버에 물어볼 수 있음)
        #               immutable이 있으면 그 요청 자체를 생략해서 더 빠름
        add_header Cache-Control "public, immutable";
    }

    # ── API 요청 프록시 ────────────────────────────────────
    # 프록시(Proxy)란?
    #   클라이언트와 서버 사이에서 요청을 대신 전달해주는 중계자입니다.
    #   브라우저 → nginx → 백엔드  순서로 요청이 전달됩니다.
    #
    # 왜 프록시를 쓰나?
    #   브라우저에서 직접 백엔드(backend:8080)에 요청하면 CORS 오류가 납니다.
    #   CORS란 브라우저 보안 정책으로, "다른 도메인에 직접 요청하면 차단"하는 규칙입니다.
    #   nginx가 같은 도메인(damoyeo.store)에서 백엔드로 대신 전달하면 CORS 문제 없음.
    #
    # /api/ 로 시작하는 모든 요청 (예: /api/groups, /api/member/login)
    location /api/ {
        # proxy_pass: 요청을 이 주소로 전달
        # "backend"는 Docker Compose 내부 DNS 이름
        # Docker 네트워크 안에서 서비스 이름으로 서로 통신 가능
        # (backend:8080 = docker-compose에서 이름이 backend인 컨테이너의 8080 포트)
        proxy_pass http://backend:8080;

        # 아래 헤더들은 "원래 요청이 어디서 왔는지" 백엔드에 알려주는 정보입니다.
        # 없으면 백엔드는 모든 요청이 nginx(127.0.0.1)에서 온 것으로 착각합니다.

        # $host: 브라우저가 요청한 도메인 (예: damoyeo.store)
        proxy_set_header Host $host;

        # $remote_addr: 실제 사용자의 IP 주소
        # 백엔드에서 IP 기반 로그 기록이나 차단 기능에 사용됨
        proxy_set_header X-Real-IP $remote_addr;

        # 프록시 서버를 여러 개 거칠 경우 거쳐온 IP 목록을 쌓아서 전달
        # 예: "221.148.1.1, 172.18.0.1" (사용자IP, nginxIP 순)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 원래 요청의 프로토콜 (https 또는 http)
        # 백엔드에서 리다이렉트 URL 생성 시 올바른 프로토콜 사용에 필요
        proxy_set_header X-Forwarded-Proto $scheme;

        # proxy_read_timeout: 백엔드가 응답하기까지 기다리는 최대 시간
        # 60초 안에 응답 없으면 nginx가 504 Gateway Timeout 오류 반환
        proxy_read_timeout 60s;

        # proxy_connect_timeout: 백엔드 서버에 연결 시도하는 최대 시간
        # 10초 안에 연결 못 하면 오류 반환 (서버가 죽었을 때 빠르게 감지)
        proxy_connect_timeout 10s;
    }

    # ── WebSocket 프록시 (채팅 기능) ───────────────────────
    # WebSocket이란?
    #   일반 HTTP는 요청-응답 1회로 끝납니다. (전화를 걸고 끊는 방식)
    #   WebSocket은 한 번 연결하면 계속 연결을 유지합니다. (통화를 끊지 않는 방식)
    #   실시간 채팅처럼 서버가 먼저 메시지를 보내야 할 때 필요합니다.
    #
    # WebSocket 연결 과정:
    #   1. 브라우저가 HTTP로 "WebSocket으로 바꿔줘" 요청 (Upgrade 요청)
    #   2. 서버가 수락 → 프로토콜이 WebSocket으로 전환
    #   3. 이후 양방향 실시간 통신 (서버→클라이언트 메시지 push 가능)
    #
    # nginx가 Upgrade 헤더를 처리해줘야 WebSocket이 작동합니다.
    #
    # /ws/ 로 시작하는 모든 요청 (예: /ws/chat)
    location /ws/ {
        proxy_pass http://backend:8080;

        # WebSocket은 HTTP/1.1에서만 작동합니다.
        # nginx 기본값이 HTTP/1.0이라 명시적으로 1.1로 올려야 합니다.
        proxy_http_version 1.1;

        # Upgrade 헤더: "이 연결을 WebSocket으로 업그레이드 해줘" 요청 전달
        # $http_upgrade: 클라이언트가 보낸 Upgrade 헤더값 (보통 "websocket")
        proxy_set_header Upgrade $http_upgrade;

        # Connection "upgrade": 연결을 업그레이드 모드로 전환하겠다는 선언
        # 이 두 헤더(Upgrade + Connection)가 없으면 WebSocket 연결 불가
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket은 채팅방에 머무는 동안 연결을 유지해야 합니다.
        # 일반 API timeout(60s)보다 훨씬 길게 1시간으로 설정
        # 1시간 동안 메시지가 없으면 연결 종료 (프론트에서 재연결 처리)
        proxy_read_timeout 3600s;
    }

    # ── 업로드 파일 프록시 ─────────────────────────────────
    # 프로필 이미지, 모임 이미지 등 사용자가 올린 파일을 제공하는 경로
    #
    # 파일은 백엔드 컨테이너의 /app/uploads 폴더에 저장됩니다.
    # docker-compose.prod.yml의 uploads_data 볼륨으로 영속 저장됩니다.
    # (컨테이너를 재시작하거나 재배포해도 파일이 삭제되지 않음)
    #
    # 접근 예시: damoyeo.store/uploads/profiles/abc123.jpg
    # → nginx가 backend:8080/uploads/profiles/abc123.jpg 로 전달
    # → Spring Boot가 파일을 읽어서 응답
    #
    # ⚠️ ^~ 수식어가 반드시 필요한 이유:
    #   nginx location 우선순위: 정규식(~*) > 일반 prefix(/)
    #   위의 정적 파일 캐싱 블록 "~* \.(jpg|jpeg|...)$" 이
    #   /uploads/profiles/abc.jpg 요청을 먼저 가로채서
    #   React 빌드 폴더(/usr/share/nginx/html)에서 파일을 찾으려 함 → 404 발생
    #   ^~(prefix 우선) 을 붙이면 이 블록이 정규식보다 먼저 처리되어 프록시가 정상 동작함
    location ^~ /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # ── 헬스체크 엔드포인트 ────────────────────────────────
    # 헬스체크(Health Check)란?
    #   "이 서버 살아있어?" 를 확인하는 기능입니다.
    #   Docker Compose, 로드밸런서, 모니터링 도구 등이 주기적으로 이 URL을 호출해서
    #   서버 상태를 자동으로 확인합니다.
    #
    # damoyeo.store/health 접속 시 → "healthy" 텍스트와 200 OK 즉시 반환
    # 200 OK = HTTP 성공 응답 코드 (요청이 정상 처리됐음을 의미)
    location /health {
        # access_log off: 이 경로의 접속 기록은 로그 파일에 남기지 않음
        # 헬스체크는 수십 초마다 자동 호출되어 로그가 쌓이는 것을 방지
        access_log off;

        # 200 상태코드와 "healthy\n" 텍스트를 즉시 반환 (백엔드 없이 nginx가 직접 응답)
        return 200 "healthy\n";

        # 응답의 Content-Type을 text/plain으로 설정
        # 없으면 브라우저가 파일 형식을 모르고 다운로드 창을 띄울 수 있음
        add_header Content-Type text/plain;
    }
}
